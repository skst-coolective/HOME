<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKST Collective</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Arial Rounded MT Bold", "Helvetica Rounded", Arial, sans-serif;
      background: #040144;
      color: #ffffff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 9vw, 120px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      font-weight: 400;
      text-transform: uppercase;
      color: #ffffff;
    }

    .subtitle {
      margin-top: 18px;
      font-size: clamp(16px, 2vw, 24px);
      color: #ffffff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .poster {
      margin-top: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .poster img {
      display: block;
      width: min(720px, 100%);
      height: auto;
    }

    .email {
      display: inline-block;
      margin-top: 42px;
      font-size: clamp(18px, 2.2vw, 28px);
      color: #ffffff;
      text-decoration: none;
      border-bottom: 2px solid #ffffff;
      padding-bottom: 6px;
      transition: opacity 0.2s ease;
      word-break: break-word;
      font-weight: 400;
    }

    .email:hover {
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>SUBTEXTURA<br>VALENCIA 2026</h1>
    <div class="subtitle">SKST Collective</div>

    <div class="poster">
      <img src="posters.png" alt="Subtextura posters" />
    </div>

    <a class="email" href="mailto:info@skst-collective.com">info@skst-collective.com</a>
  </main>
</body>
</html>
